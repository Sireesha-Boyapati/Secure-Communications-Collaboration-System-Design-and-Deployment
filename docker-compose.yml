services:
  mongodb:
    image: mongo:7
    container_name: studysafe-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: studysafe
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studysafe-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: studysafe
      ENVIRONMENT: development
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: studysafe-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
